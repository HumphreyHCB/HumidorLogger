name: Generate and Release Plots

on:
  push:
    branches:
      - master

permissions:
  contents: write  # required to push tags & create releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run plot generation script
        run: python Plotter.py

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-plots
          path: |
            Plots/Humidity.pdf
            Plots/Temperature.pdf
            Plots/summary.csv

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-plots
          path: release_files

      # STEP A: Generate a date/time string for the tag
      - name: Get timestamp
        id: get_timestamp
        run: echo "tag_name=plots-$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      # STEP B: Create and push the tag to the remote
      - name: Push Tag to Remote
        id: push_tag
        run: |
          TAG="${{ steps.get_timestamp.outputs.tag_name }}"
          echo "Tag to push: $TAG"

          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git tag "$TAG"
          git push origin "$TAG"

      # STEP C: Create Release for that tag
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_timestamp.outputs.tag_name }}
          name: "Plot Release ${{ steps.get_timestamp.outputs.tag_name }}"
          body: "Automated release of generated plots and summary."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # STEP D: Upload each file to the same tag/release
      - name: Upload Release Asset (Humidity.pdf)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_timestamp.outputs.tag_name }}  # <-- REQUIRED
          files: 'release_files/Humidity.pdf'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (Temperature.pdf)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_timestamp.outputs.tag_name }}  # <-- REQUIRED
          files: 'release_files/Temperature.pdf'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (summary.csv)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_timestamp.outputs.tag_name }}  # <-- REQUIRED
          files: 'release_files/summary.csv'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}