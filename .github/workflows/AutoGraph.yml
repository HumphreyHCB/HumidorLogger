name: Generate and Release Plots

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run plot generation script
        run: python Plotter.py

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-plots
          path: |
            Plots/Humidity.pdf
            Plots/Temperature.pdf
            Plots/summary.csv

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-plots
          path: release_files

      # STEP 1: Generate a date/time string for the tag
      - name: Get timestamp
        id: get_timestamp
        run: echo "tag_name=plots-$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      # STEP 2: Use that tag_name output in the GH Release step
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_timestamp.outputs.tag_name }}
          name: "Plot Release ${{ steps.get_timestamp.outputs.tag_name }}"
          body: 'Automated release of generated plots and summary.'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # STEP 3: Upload each file to the release
      - name: Upload Release Asset Humidity.pdf
        uses: softprops/action-gh-release@v1
        with:
          files: 'release_files/Humidity.pdf'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset Temperature.pdf
        uses: softprops/action-gh-release@v1
        with:
          files: 'release_files/Temperature.pdf'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset summary.csv
        uses: softprops/action-gh-release@v1
        with:
          files: 'release_files/summary.csv'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}